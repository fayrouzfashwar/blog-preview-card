<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
    <title>Frontend Mentor | Blog preview card</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div class="card">
        <img src="./assets/images/illustration-article.svg" alt="">
        <span class="topic">Learning</span>
        <p class="date">Published 21 Dec 2023</p>
        <p class="blog-title">HTML & CSS foundations</p>
        <p class="blog-description">These languages are the backbone of every website, defining structure, content, and presentation.</p>
        <div class="user">
            <img src="./assets/images/image-avatar.webp" alt="avatar" class="avatar">
            <span class="user-name">Greg Hooper</span>
            <span class="shadow"></span>
        </div>
    </div>

    Coded by <a href="#">Fayrouz Fashwar</a>.
    </footer> -->
</body>
</html>
